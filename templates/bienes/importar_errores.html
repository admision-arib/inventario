{% extends 'base.html' %}
{% block content %}
<div class="w-full max-w-3xl mx-auto my-6 bg-white p-6 rounded-2xl border border-rose-200 shadow-xl">
    <div class="flex items-center gap-3 border-b border-rose-100 pb-4 mb-4">
        <div class="w-10 h-10 rounded-xl bg-rose-50 text-rose-600 flex items-center justify-center flex-shrink-0">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"/>
            </svg>
        </div>
        <div>
            <h2 class="text-lg font-bold text-slate-900">La importación ha sido rechazada</h2>
            <p class="text-xs text-slate-500">Se detectaron inconsistencias lógicas en el documento Excel. Ningún bien fue guardado.</p>
        </div>
    </div>

    <div class="bg-slate-50 border border-slate-200 rounded-xl max-h-96 overflow-y-auto divide-y divide-slate-100">
        {% for error in errores %}
            <div class="p-3 text-xs text-rose-700 font-medium flex items-start gap-2">
                <span class="inline-block w-2 h-2 rounded-full bg-rose-500 mt-1 flex-shrink-0"></span>
                <span>{{ error }}</span>
            </div>
        {% endfor %}
    </div>

    <div class="mt-6 flex justify-end">
        <a href="{% url 'lista_bienes' %}" class="bg-slate-900 hover:bg-slate-800 text-white text-xs font-bold px-4 py-2.5 rounded-xl transition">
            Regresar al Inventario
        </a>
    </div>
</div>
{% endblock %}
